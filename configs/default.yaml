random_seed: 42

paths:
  data_dir: data/synthetic
  reports_dir: reports
  train_dataset: data/synthetic/train.csv
  test_dataset: data/synthetic/test.csv
  customers_dataset: data/synthetic/customers.csv
  accounts_dataset: data/synthetic/accounts.csv
  devices_dataset: data/synthetic/devices.csv
  login_events_dataset: data/synthetic/login_events.csv
  investigations_dataset: data/synthetic/investigations.csv
  alerts_dataset: data/synthetic/alerts.csv
  edges_dataset: data/synthetic/edges.csv
  model_dir: reports/models

synthetic_data:
  n_customers: 2500
  n_accounts: 3200
  n_devices: 2500
  n_transactions_train: 25000
  n_transactions_test: 10000
  n_login_events: 8000
  fraud_rate: 0.035
  ato_rate: 0.015
  investigation_rate: 0.12
  start_date: "2025-01-01"
  test_start_date: "2025-10-01"

models:
  logistic:
    C: 1.0
    max_iter: 500
  hgb:
    learning_rate: 0.07
    max_depth: 6
    max_iter: 200
  isolation_forest:
    contamination: 0.04
    n_estimators: 150

rules:
  high_amount_threshold: 2200
  rapid_txn_threshold_1h: 6
  linked_accounts_threshold: 3
  geo_novelty_penalty: 1

thresholds:
  review_score: 0.25
  challenge_score: 0.45
  high_priority_score: 0.35

monitoring:
  psi_bins: 10
  drift_alert_threshold: 0.20

fairness:
  protected_segments:
    - age_band
    - customer_segment
